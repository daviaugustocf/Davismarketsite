
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Caixa - Supermercado</title>
    <style>
        :root {
            --primary: #2e7d32;
            --secondary: #fbc02d;
            --dark: #333;
            --light: #f4f4f4;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--light); display: flex; height: 100vh; overflow: hidden; }

        /* Painel Lateral Esquerdo (Lista de Produtos) */
        .pdv-container { flex: 2; display: flex; flex-direction: column; background: white; border-right: 2px solid #ddd; }
        
        .header { background: var(--primary); color: white; padding: 20px; font-size: 24px; font-weight: bold; text-align: center; }

        .lista-produtos { flex-grow: 1; padding: 20px; overflow-y: auto; }
        
        table { width: 100%; border-collapse: collapse; }
        th { border-bottom: 2px solid var(--dark); text-align: left; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #eee; }

        /* Painel Direito (Resumo e Inputs) */
        .painel-pagamento { flex: 1; background: #eceff1; padding: 30px; display: flex; flex-direction: column; justify-content: space-between; }

        .campo-input { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--dark); }
        input { width: 100%; padding: 15px; font-size: 20px; border: 2px solid #ccc; border-radius: 5px; box-sizing: border-box; }

        .total-box { background: var(--dark); color: var(--secondary); padding: 30px; border-radius: 8px; text-align: right; }
        .total-label { font-size: 1.2rem; display: block; }
        .total-valor { font-size: 3.5rem; font-weight: bold; }

        .btn-finalizar { background: var(--primary); color: white; border: none; padding: 20px; font-size: 1.5rem; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .btn-finalizar:hover { background: #1b5e20; }
    </style>
</head>
<body>

    <div class="pdv-container">
        <div class="header">SUPERMERCADO - CAIXA LIVRE</div>
        <div class="lista-produtos">
            <table id="tabela-itens">
                <thead>
                    <tr>
                        <th>ITEM</th>
                        <th>DESCRIÇÃO</th>
                        <th>QTD</th>
                        <th>PREÇO UNIT.</th>
                        <th>TOTAL</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="painel-pagamento">
        <div>
            <div class="campo-input">
                <label>CÓDIGO DO PRODUTO (ou nome)</label>
                <input type="text" id="input-codigo" autofocus placeholder="Pressione Enter para adicionar">
            </div>
            <div class="campo-input">
                <label>QUANTIDADE</label>
                <input type="number" id="input-qtd" value="1">
            </div>
        </div>

        <div class="total-box">
            <span class="total-label">TOTAL A PAGAR</span>
            <span class="total-valor" id="total-geral">R$ 0,00</span>
        </div>

        <button class="btn-finalizar" onclick="finalizarVenda()">FINALIZAR VENDA (F8)</button>
    </div>

    <script>
        const inputCodigo = document.getElementById('input-codigo');
        const inputQtd = document.getElementById('input-qtd');
        const corpoTabela = document.getElementById('corpo-tabela');
        const displayTotal = document.getElementById('total-geral');

        let totalVenda = 0;
        let contadorItem = 1;

        // "Banco de dados" fictício de produtos
        const produtosDB = {
            "1": { nome: "Arroz 5kg", preco: 25.90 },
            "2": { nome: "Feijão Preto 1kg", preco: 8.50 },
            "3": { nome: "Leite Integral 1L", preco: 4.80 },
            "4": { nome: "Óleo de Soja", preco: 6.75 }
        };

        inputCodigo.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                adicionarItem();
            }
        });

        function adicionarItem() {
            const codigo = inputCodigo.value;
            const qtd = parseInt(inputQtd.value);
            const produto = produtosDB[codigo];

            if (produto) {
                const subtotal = produto.preco * qtd;
                
                const linha = `
                    <tr>
                        <td>${contadorItem++}</td>
                        <td>${produto.nome}</td>
                        <td>${qtd}</td>
                        <td>R$ ${produto.preco.toFixed(2)}</td>
                        <td>R$ ${subtotal.toFixed(2)}</td>
                    </tr>
                `;
                
                corpoTabela.innerHTML += linha;
                totalVenda += subtotal;
                displayTotal.innerText = `R$ ${totalVenda.toFixed(2)}`;

                // Resetar campos
                inputCodigo.value = '';
                inputQtd.value = '1';
                inputCodigo.focus();
            } else {
                alert("Produto não encontrado!");
            }
        }

        function finalizarVenda() {
            alert("Venda finalizada com sucesso! Total: " + displayTotal.innerText);
            location.reload(); // Reinicia o caixa
        }

        // Atalho de teclado
        window.onkeydown = function(e) {
            if (e.key === "F8") finalizarVenda();
        };
    </script>
</body>
</html>
